services:
  web:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "4173:4173"
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4173"
  api:
    image: node:22-alpine
    working_dir: /app/backend
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
      - /app/backend/node_modules
    command: sh -c "npm install && npm run dev"
